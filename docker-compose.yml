version: "3.9"
services:

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance_secret
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  opa:
    image: openpolicyagent/opa:0.58.0
    ports: ["8181:8181"]
    command: run --server --addr 0.0.0.0:8181 /policies
    volumes:
      - ./backend/policies:/policies

  # ── Local LLM (Ollama — runs Llama 3.1 8B locally) ─────────────────────
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    environment:
      OLLAMA_KEEP_ALIVE: "-1"   # Never unload models from memory
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 6G
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull llama3.1 &&
             wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    build: ./backend/api
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://compliance:compliance_secret@postgres:5432/compliance_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: compliance-docs
      OPA_URL: http://opa:8181
      SECRET_KEY: super-secret-jwt-key-change-in-production
      CELERY_BROKER_URL: redis://redis:6379/1
      INGEST_SERVICE_URL: http://ingest:8001
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: llama3.1
      LLM_JUDGE_MODEL: llama3.1
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      HF_ENDPOINT: https://hf-mirror.com
    depends_on: [postgres, redis, minio, opa, ingest, ollama]
    volumes:
      - ./backend/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend/api
    environment:
      DATABASE_URL: postgresql+asyncpg://compliance:compliance_secret@postgres:5432/compliance_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: compliance-docs
      OPA_URL: http://opa:8181
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: llama3.1
      LLM_JUDGE_MODEL: llama3.1
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      HF_ENDPOINT: https://hf-mirror.com
      SECRET_KEY: super-secret-jwt-key-change-in-production
    depends_on: [postgres, redis, minio, ollama]
    volumes:
      - ./backend/api:/app
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2

  ingest:
    build: ./backend/ingest-service
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql://compliance:compliance_secret@postgres:5432/compliance_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: compliance-docs
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      HF_ENDPOINT: https://hf-mirror.com
    depends_on: [postgres, minio]
    volumes:
      - ./backend/ingest-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollama_models:
